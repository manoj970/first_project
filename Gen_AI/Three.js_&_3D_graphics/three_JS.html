<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Solar System Assignment</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, #111827 0%, #02040d 75%);
      color: #e2e8f0;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .info {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 16px;
      background: rgba(10, 14, 26, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      max-width: 320px;
      line-height: 1.5;
    }

    .info h1 {
      margin: 0 0 8px;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .info p {
      margin: 0;
      font-size: 0.88rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="info">
    <h1>Three.js Mini Solar System</h1>
    <p>Use mouse drag to rotate. Scroll to zoom. The sun lights the planets while they orbit continuously.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    // Create the scene: the container for all 3D objects, lights, and camera.
    const scene = new THREE.Scene();

    // Create the camera: PerspectiveCamera simulates human vision.
    const camera = new THREE.PerspectiveCamera(
      55,                               // field of view
      window.innerWidth / window.innerHeight, // aspect ratio
      0.1,                              // near clipping plane
      100                               // far clipping plane
    );
    camera.position.set(0, 9, 20);     // position the camera so the solar system is visible
    camera.lookAt(0, 0, 0);            // point the camera at the scene center

    // Create the renderer: use WebGLRenderer and attach it to the page.
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x02040d);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Add interactive controls so users can rotate and zoom the scene.
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 8;
    controls.maxDistance = 35;
    controls.target.set(0, 0, 0);

    // Create the sun geometry and glowing material.
    const sunGeometry = new THREE.SphereGeometry(2.5, 32, 32);
    const sunMaterial = new THREE.MeshStandardMaterial({
      color: 0xffc56f,
      emissive: 0xffb347,
      emissiveIntensity: 1.3,
      roughness: 0.35,
      metalness: 0.2,
    });
    const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sunMesh);

    // Add lighting: a PointLight at the sun plus ambient lighting for the whole scene.
    const sunLight = new THREE.PointLight(0xffffff, 2.0, 120);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x5c6b89, 0.6);
    scene.add(ambientLight);

    // Helper function to create a planet and its orbiting group.
    function createPlanet(radius, color, distance, speed) {
      const group = new THREE.Object3D();
      const geometry = new THREE.SphereGeometry(radius, 24, 24);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.55,
        metalness: 0.1,
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.x = distance;
      group.add(mesh);
      scene.add(group);
      return { group, mesh, speed };
    }

    // Create planets with different colors, sizes, and orbit speeds.
    const planets = [
      createPlanet(0.4, 0x9eb5d0, 4.8, 0.038), // Mercury-like
      createPlanet(0.6, 0xd29f5b, 6.4, 0.027), // Venus-like
      createPlanet(0.75, 0x5f95e0, 9.0, 0.019), // Earth-like
      createPlanet(0.55, 0x7fb089, 11.5, 0.013), // Mars-like
      createPlanet(1.15, 0xc79972, 15.2, 0.009), // Jupiter-like
    ];

    // Add orbit rings for each planet for better visual structure.
    planets.forEach((planet) => {
      const ringGeometry = new THREE.RingGeometry(planet.mesh.position.x - 0.03, planet.mesh.position.x + 0.03, 96);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        opacity: 0.1,
        transparent: true,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);
    });

    // Animation loop: rotate planets around the sun and render the scene.
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      planets.forEach((planet) => {
        planet.group.rotation.y = elapsed * planet.speed;
        planet.mesh.rotation.y += 0.005; // rotate planet on its own axis
      });

      sunMesh.rotation.y += 0.002; // slow sun rotation
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Resize handling: update camera and renderer when the window size changes.
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
